name: Deploy CC Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Build frontend on GitHub-hosted runner, deploy to Linux EC2 ──
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: acdb-api/frontend
        run: |
          npm ci
          npm run build
          echo "Frontend built: $(find dist -type f | wc -l) files"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 30 -H ${{ secrets.EC2_LINUX_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy frontend to Linux EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_LINUX_HOST }} "sudo rm -rf /opt/cc-portal/frontend/*"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            acdb-api/frontend/dist/ \
            ubuntu@${{ secrets.EC2_LINUX_HOST }}:/tmp/cc-frontend/
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_LINUX_HOST }} \
            "sudo cp -r /tmp/cc-frontend/* /opt/cc-portal/frontend/ && sudo chown -R root:root /opt/cc-portal/frontend/ && rm -rf /tmp/cc-frontend"
          echo "Frontend deployed to Linux EC2"

      - name: Verify frontend
        run: |
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cc.1pwrafrica.com/)
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Frontend returned $STATUS"
            exit 1
          fi

  # ── Job 2: Deploy backend to Linux EC2 (replaces Windows self-hosted runner) ──
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 30 -H ${{ secrets.EC2_LINUX_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend to Linux EC2
        run: |
          # Sync Python backend files (exclude frontend, venv, caches, db files)
          rsync -avz --delete \
            --exclude='frontend/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.mypy_cache/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='*.accdb' \
            --exclude='cc_auth.db' \
            --exclude='firebase-service-account.json' \
            --exclude='*.pyc' \
            --exclude='*.ldb' \
            -e "ssh -i ~/.ssh/deploy_key" \
            acdb-api/ \
            ubuntu@${{ secrets.EC2_LINUX_HOST }}:/tmp/cc-backend/

          # Move to final location and set permissions
          # Script is POSIX sh (no `local`) so it works if SSH uses /bin/sh (dash).
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_LINUX_HOST }} << 'DEPLOY_SCRIPT'
            sudo rsync -a /tmp/cc-backend/ /opt/cc-portal/backend/
            sudo chown -R cc_api:cc_api /opt/cc-portal/backend/
            rm -rf /tmp/cc-backend

            # Install Python dependencies if requirements changed
            cd /opt/cc-portal/backend
            if [ -f venv/bin/pip ]; then
              sudo -u cc_api venv/bin/pip install -r requirements.txt --quiet 2>/dev/null
            fi

            # Apply incremental CC migrations only (010_*.sql, 011_*.sql, …).
            # Do NOT run 001–009 here: legacy ops (e.g. DROP COLUMN) need table owner / DBA;
            # cc_api would fail with "must be owner of table".
            MIG_DIR=/opt/cc-portal/backend/migrations
            apply_incremental() {
              _env="$1"
              if [ ! -f "$_env" ]; then
                echo "Skipping migrations: $_env not found"
                return 0
              fi
              INCR=$(find "$MIG_DIR" -maxdepth 1 -name '0[1-9][0-9]_*.sql' -type f | sort -V)
              for f in $INCR; do
                [ -f "$f" ] || continue
                echo "Applying $(basename "$f")..."
                sudo -u cc_api sh -c "set -a; . '$_env'; set +a; export DATABASE_URL; psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1 -f '$f'" || exit 1
              done
            }
            apply_incremental /opt/1pdb/.env
            if [ -f /opt/1pdb-bn/.env ]; then
              apply_incremental /opt/1pdb-bn/.env
            fi

            # Restart both API services (LS on :8100, BN on :8101)
            sudo systemctl restart 1pdb-api
            sudo systemctl restart 1pdb-api-bn
            echo "Backend deployed and both services restarted"
          DEPLOY_SCRIPT

      - name: Health check (LS)
        run: |
          echo "Waiting for services to start..."
          sleep 8
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cc.1pwrafrica.com/api/health)
            echo "LS health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              curl -s https://cc.1pwrafrica.com/api/health | python3 -m json.tool
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: LS health check failed after 3 attempts"
          exit 1

      - name: Health check (BN)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cc.1pwrafrica.com/api/bn/health)
            echo "BN health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              curl -s https://cc.1pwrafrica.com/api/bn/health | python3 -m json.tool
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: BN health check failed after 3 attempts"
          exit 1
